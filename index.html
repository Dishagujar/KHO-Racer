<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Racing Pro: Color Shift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        .glass { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); }
        
        /* Smooth color transition for the whole world */
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            touch-action: none; display: flex; justify-content: center;
            background: #064e3b; /* Initial Grass Color */
            transition: background 2s ease; 
        }
        
        #road {
            width: 85%; height: 100vh; position: absolute; bottom: 0;
            border-left: 6px solid #fbbf24; border-right: 6px solid #fbbf24; overflow: hidden;
            z-index: 10;
            background: #1e293b; /* Initial Road Color */
            transition: background 2s ease;
        }

        .lane-line {
            position: absolute; left: 50%; width: 8px; height: 100%; transform: translateX(-50%);
            background-image: linear-gradient(to bottom, #fbbf24 0%, #fbbf24 50%, transparent 50%, transparent 100%);
            background-size: 8px 100px;
        }

        #player-car {
            position: absolute; width: 50px; height: 90px; z-index: 50;
            bottom: 20%; left: 50%; transform: translateX(-50%);
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
        }

        .enemy-car { position: absolute; width: 50px; height: 90px; z-index: 40; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="font-['Manrope'] select-none">

    <div id="road"><div id="road-lines" class="lane-line"></div></div>

    <div id="startOverlay" class="fixed inset-0 z-[1000] bg-black/60 flex flex-col items-center justify-center text-white text-center p-10">
        <div class="bg-yellow-400 text-black px-10 py-5 rounded-full font-black text-2xl animate-pulse shadow-2xl mb-4">
            TAP TO START
        </div>
        <p class="text-xs font-bold opacity-70">WATCH THE WORLD CHANGE AS YOU DRIVE</p>
    </div>

    <div class="fixed top-[5%] w-full flex flex-col items-center z-[100] pointer-events-none">
        <div class="flex items-baseline text-white italic font-black">
            <span id="speedo" class="text-5xl">000</span>
            <span class="text-lg ml-1">KM/H</span>
        </div>
        <div class="bg-black/40 px-4 py-1 rounded-full text-yellow-400 font-black text-xs mt-2">
            SCORE: <span id="score">0</span>
        </div>
    </div>

    <div class="fixed bottom-6 left-4 z-[200] flex gap-3">
        <button id="leftBtn" class="glass ctrl-btn"><span class="material-symbols-outlined text-white text-4xl">arrow_back</span></button>
        <button id="rightBtn" class="glass ctrl-btn"><span class="material-symbols-outlined text-white text-4xl">arrow_forward</span></button>
    </div>

    <div class="fixed bottom-6 right-4 z-[200] flex items-end gap-3">
        <button id="brakeBtn" class="glass h-14 px-5 rounded-2xl text-white font-black text-[10px]">BRAKE</button>
        <button id="gasBtn" class="glass w-20 h-32 rounded-3xl flex flex-col items-center justify-center">
            <span class="text-white font-black text-sm">GAS</span>
            <span class="material-symbols-outlined text-white text-5xl">bolt</span>
        </button>
    </div>

    <img id="player-car" src="data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMTIwIDI1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB4PSIyMCIgeT0iMTAiIHdpZHRoPSI4MCIgaGVpZ2h0PSIyMzAiIHJ4PSI4IiBmaWxsPSIjZGMyNjI2IiBzdHJva2U9IiMwMDAiIHN0cm9rZS13aWR0aD0iNCIvPgogIDxyZWN0IHg9IjMwIiB5PSI3MCIgd2lkdGg9IjYwIiBoZWlnaHQ9IjEwMCIgcng9IjQiIGZpbGw9IiMzMzMiLz4KPC9zdmc+">

    <script>
        let speed = 0, carX = 50, score = 0, roadOff = 0, gameActive = false;
        let inputs = { left: false, right: false, gas: false, brake: false };
        let enemies = [];

        const car = document.getElementById('player-car');
        const road = document.getElementById('road');
        const lines = document.getElementById('road-lines');
        const overlay = document.getElementById('startOverlay');
        const scoreEl = document.getElementById('score');

        // Color Themes: [Grass Color, Road Color]
        const themes = [
            ['#064e3b', '#1e293b'], // Level 1: Forest/Night
            ['#7c2d12', '#44403c'], // Level 2: Canyon
            ['#1e3a8a', '#0f172a'], // Level 3: Cyber/Neon
            ['#4c1d95', '#2e1065'], // Level 4: Purple Haze
            ['#065f46', '#022c22']  // Level 5: Deep Jungle
        ];

        function updateEnvironment() {
            let level = Math.floor(score / 500); // Change every 500 points
            let themeIndex = level % themes.length;
            document.body.style.background = themes[themeIndex][0];
            road.style.background = themes[themeIndex][1];
        }

        function startGame() {
            if (gameActive) return;
            overlay.style.display = 'none';
            score = 0; speed = 0; carX = 50;
            enemies.forEach(e => e.el.remove());
            enemies = [];
            gameActive = true;
            updateEnvironment();
            requestAnimationFrame(loop);
        }

        overlay.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });
        overlay.addEventListener('mousedown', startGame);

        function loop() {
            if (!gameActive) return;
            if (inputs.gas) speed = Math.min(120, speed + 1.2); 
            else if (inputs.brake) speed = Math.max(0, speed - 5); 
            else speed = Math.max(0, speed - 0.8); 
            let steer = 0;
            if (inputs.left) steer = -2.8;
            if (inputs.right) steer = 2.8;
            
            carX = Math.max(15, Math.min(85, carX + steer));
            car.style.left = carX + "%";
            car.style.transform = `translateX(-50%) rotate(${steer * 4}deg)`;

            roadOff += (speed / 6);
            lines.style.backgroundPositionY = roadOff + "px";
            document.getElementById('speedo').innerText = Math.floor(speed).toString().padStart(3, '0');
            
            // Score and Color Check
            if (speed > 20) {
                score += (speed / 100);
                scoreEl.innerText = Math.floor(score);
                updateEnvironment();
            }

            if (speed > 30 && Math.random() < 0.015) spawnEnemy();
            updateEnemies();
            
            requestAnimationFrame(loop);
        }

        function spawnEnemy() {
            const el = document.createElement('img');
            el.src = "data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMTIwIDI1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB4PSIyMCIgeT0iMTAiIHdpZHRoPSI4MCIgaGVpZ2h0PSIyMzAiIHJ4PSI4IiBmaWxsPSIjMDU5NmY2IiBzdHJva2U9IiMwMDAiIHN0cm9rZS13aWR0aD0iNCIvPjwvc3ZnPg==";
            el.className = 'enemy-car';
            el.style.left = (Math.random() * 60 + 20) + "%";
            el.style.top = "-150px";
            el.style.transform = "rotate(180deg) translateX(50%)";
            road.appendChild(el);
            enemies.push({ el, y: -150 });
        }

        function updateEnemies() {
            const pR = car.getBoundingClientRect();
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += (speed / 12) + 4;
                e.el.style.top = e.y + "px";

                const eR = e.el.getBoundingClientRect();
                if (!(pR.right-12 < eR.left+12 || pR.left+12 > eR.right-12 || pR.bottom-12 < eR.top+12 || pR.top+12 > eR.bottom-12)) {
                    gameActive = false;
                    overlay.style.display = 'flex';
                    overlay.querySelector('div').innerText = "CRASHED! TAP TO RETRY";
                }
                if (e.y > window.innerHeight) { e.el.remove(); enemies.splice(i, 1); }
            }
        }

        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; });
            el.addEventListener('mousedown', (e) => { inputs[key] = true; });
            el.addEventListener('mouseup', (e) => { inputs[key] = false; });
        };

        bind('leftBtn', 'left'); bind('rightBtn', 'right');
        bind('gasBtn', 'gas'); bind('brakeBtn', 'brake');
        // Keyboard Support for PC
window.addEventListener('keydown', (e) => {
    if (e.key === "ArrowLeft") inputs.left = true;
    if (e.key === "ArrowRight") inputs.right = true;
    if (e.key === "ArrowUp" || e.key === " ") inputs.gas = true; // Up or Space for Gas
    if (e.key === "ArrowDown") inputs.brake = true;
});

window.addEventListener('keyup', (e) => {
    if (e.key === "ArrowLeft") inputs.left = false;
    if (e.key === "ArrowRight") inputs.right = false;
    if (e.key === "ArrowUp" || e.key === " ") inputs.gas = false;
    if (e.key === "ArrowDown") inputs.brake = false;
});
    </script>
</body>
</html>
